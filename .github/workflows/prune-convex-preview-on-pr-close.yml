name: Prune Convex preview on PR close

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Shorten Convex preview expiry to 24h
        env:
          CONVEX_TEAM_ACCESS_TOKEN: ${{ secrets.CONVEX_TEAM_ACCESS_TOKEN }}
        run: |
          npx tsx scripts/prune-convex-previews.ts \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --apply
